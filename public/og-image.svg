<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0D9488"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065F46;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Logo circle -->
  <circle cx="600" cy="220" r="80" fill="white" fill-opacity="0.15"/>
  <text x="600" y="240" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">KP</text>
  <!-- App name -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">KosPintar</text>
  <!-- Tagline -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="28" fill="white" fill-opacity="0.9" text-anchor="middle">Aplikasi Manajemen Kos Terbaik di Indonesia</text>
  <!-- Price badge -->
  <rect x="460" y="470" width="280" height="60" rx="30" fill="white" fill-opacity="0.2"/>
  <text x="600" y="508" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">Mulai Rp 249.000/tahun</text>
</svg>
